services:
  - type: web
    name: fantasy-ball-is-life-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ESPN_LEAGUE_ID
        sync: false
      - key: ESPN_SEASON
        sync: false
      - key: ESPN_SWID
        sync: false
      - key: ESPN_S2
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.12
      - key: WORKER_SECRET
        sync: false
      - key: CRED_ENCRYPTION_KEY
        sync: false

  - type: cron
    name: fantasy-ball-is-life-snapshot-refresh
    env: python
    schedule: "*/15 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m backend.worker.cron_entrypoint

  - type: static
    name: fantasy-ball-is-life-site
    rootDir: frontend/dist
    buildCommand: cd frontend && npm ci && npm run build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
