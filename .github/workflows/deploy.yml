name: Deploy

on:
  push:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -q

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd frontend && npm ci
      - run: cd frontend && npx tsc --noEmit
      - run: cd frontend && npm run build

  deploy:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build frontend
        run: |
          cd frontend
          npm ci
          VITE_API_BASE=${{ secrets.VITE_API_BASE }} \
          VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }} \
          VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }} \
          VITE_RECAP_LEAGUE_SLUG=patriot-games \
          VITE_RECAP_SEASON=${{ secrets.VITE_RECAP_SEASON }} \
          npm run build
      - name: Deploy to VPS
        uses: appleboy/scp-action@v0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          source: "frontend/dist/*,backend/**,requirements.txt,Dockerfile,docker-compose.yml,Caddyfile,.dockerignore"
          target: /srv/fullcourtpress/
          strip_components: 0
          rm: false
      - name: Restart stack
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          script: |
            cd /srv/fullcourtpress
            sudo docker compose up -d --build --remove-orphans
            sudo docker compose ps
