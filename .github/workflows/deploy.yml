name: Deploy

on:
  push:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -q

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd frontend && npm ci
      - run: cd frontend && npx tsc --noEmit
      - run: cd frontend && npm run build

  deploy:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          script: |
            set -e
            cd /srv/fullcourtpress

            # Pull latest and build frontend in one shot
            sudo git fetch origin main
            sudo git reset --hard origin/main
            sudo chown -R fcp-svc:fcp-svc .

            # Build frontend with prod env
            cd frontend
            export VITE_API_BASE=${{ secrets.VITE_API_BASE }}
            export VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            export VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
            export VITE_RECAP_LEAGUE_SLUG=patriot-games
            export VITE_RECAP_SEASON=${{ secrets.VITE_RECAP_SEASON }}
            npm ci
            npm run build
            cd ..

            # Rebuild and restart
            sudo docker compose up -d --build --remove-orphans
            sudo docker compose ps
