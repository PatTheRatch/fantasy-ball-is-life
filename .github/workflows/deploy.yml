name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── N-2: RLS boundary tests against local Supabase ──────────────────
  test-rls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Apply migrations + seed leagues
        run: |
          supabase db reset
          # Seed public + private leagues for RLS tests
          supabase db query "insert into public.leagues (id, slug, name, visibility, espn_league_id) values ('30000000-0000-4000-8000-000000000001', 'test-public', 'Test Public', 'public', '1') on conflict (slug) do nothing;"
          supabase db query "insert into public.leagues (id, slug, name, visibility, espn_league_id) values ('30000000-0000-4000-8000-000000000002', 'test-private', 'Test Private', 'private', '2') on conflict (slug) do nothing;"

      - name: Extract local keys
        id: keys
        run: |
          echo "ANON=$(supabase status --output json 2>/dev/null | python3 -c 'import json,sys; print(json.load(sys.stdin)["anon_key"])')" >> $GITHUB_OUTPUT
          echo "SERVICE=$(supabase status --output json 2>/dev/null | python3 -c 'import json,sys; print(json.load(sys.stdin)["service_role_key"])')" >> $GITHUB_OUTPUT

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests pytest

      - name: Run RLS boundary tests
        env:
          SUPABASE_TEST_URL: http://localhost:54321
          SUPABASE_TEST_ANON_KEY: ${{ steps.keys.outputs.ANON }}
          SUPABASE_TEST_SERVICE_KEY: ${{ steps.keys.outputs.SERVICE }}
        run: python -m pytest tests/test_n2_rls.py -v

      - name: Stop Supabase
        if: always()
        run: supabase stop

  # ── Backend tests ──────────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ --ignore=tests/test_n2_rls.py -q

  # ── Deploy ─────────────────────────────────────────────────────────
  build-and-deploy:
    needs: [test-rls, test-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Guard — Supabase anon key secret is present
        env:
          ANON: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          test -n "$ANON" || { echo "::error::VITE_SUPABASE_ANON_KEY secret is not set — refusing to ship a broken build"; exit 1; }

      - name: Build frontend (prod env)
        working-directory: frontend
        env:
          VITE_API_BASE: https://fcp.patrickmcdowell.dev/api
          VITE_API_BASE_DIRECT: https://fcp.patrickmcdowell.dev/api
          VITE_SUPABASE_URL: https://wuzoengojiqotusulwhj.supabase.co
          VITE_RECAP_LEAGUE_SLUG: patriot-games
          VITE_RECAP_SEASON: "2026"
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Sanity — assert env baked into the bundle
        working-directory: frontend
        run: |
          grep -rq "fcp.patrickmcdowell.dev/api" dist/assets/*.js || { echo "::error::API base not baked into bundle"; exit 1; }
          grep -rq "supabase.co"                  dist/assets/*.js || { echo "::error::Supabase URL not baked into bundle"; exit 1; }
          if grep -rq "localhost:8000" dist/assets/*.js; then echo "::error::localhost:8000 leaked into prod bundle"; exit 1; fi

      - name: Package dist
        run: tar -C frontend/dist -czf dist.tgz .

      - name: Copy dist to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          source: "dist.tgz"
          target: "/tmp"

      - name: Update backend code, unpack dist, restart stack
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          script: |
            set -e
            cd /srv/fullcourtpress
            sudo git fetch origin main
            sudo git reset --hard origin/main
            sudo mkdir -p frontend/dist
            sudo find frontend/dist -mindepth 1 -delete
            sudo tar -C frontend/dist -xzf /tmp/dist.tgz
            sudo chown -R fcp-svc:fcp-svc frontend/dist
            rm -f /tmp/dist.tgz
            sudo docker compose up -d --build --force-recreate --remove-orphans
            sudo docker compose ps
